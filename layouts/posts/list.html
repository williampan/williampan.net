{{ define "title"}}{{ .Title }} · {{ .Site.Title }}{{ end }}

{{ define "main" }}
<main class="column">
    <div class="list">
        <h1 class="title">{{ .Title | markdownify }}</h1>
            {{ range .Pages.GroupByDate "2006" }}
            <h2>{{ .Key }}</h2>
            <ul>
                {{ range .Pages }}
                <li>
                    <div class="title"><a href="{{ .Permalink }}">{{ .Title }}</a></div>
                    <!-- <div class="copy">{{ .Content }}</div> -->
                </li>
                {{ end }}
            </ul>
            {{ end }}
    </div>
</main>
{{ end }}
