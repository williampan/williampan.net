{{ define "title"}}{{ .Title }} · {{ .Site.Title }}{{ end }}

{{ define "main" }}
<main class="{{ .Type }}">
	<article>
		<h1 class="title">{{ .Title | markdownify }}</h1>
		<div class="copy">{{ .Content }}</div>
		{{ with .Date }}
			<div class="date">{{ .Format "January 2006" }}</div>
		{{ end}}
	</article>
</main>
{{ end }}
